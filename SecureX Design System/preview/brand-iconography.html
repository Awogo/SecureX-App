<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_base.css">
<style>
  .icon-tile { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .icon-tile .box {
    width:44px; height:44px; background:#F6F7FB; border:1px solid #E5E7EB; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
  }
  .icon-tile .lbl { font-family:'Inter',sans-serif; font-size:10px; color:#7A7A7A; }
  .icon { stroke:#1E1E1E; }
</style></head>
<body><div class="card">
  <div style="display:flex;gap:16px;flex-wrap:wrap">
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 3v5c0 5-3.5 9-8 11-4.5-2-8-6-8-11V6l8-3z"/><path d="M9 12l2 2 4-4"/></svg></div><div class="lbl">shield-check</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg></div><div class="lbl">card</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg></div><div class="lbl">lock</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M2.5 12C4 7 7.8 4 12 4s8 3 9.5 8c-1.5 5-5.3 8-9.5 8s-8-3-9.5-8z"/></svg></div><div class="lbl">eye</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H7a2 2 0 00-2 2v16a2 2 0 002 2h10a2 2 0 002-2V7l-5-5z"/><path d="M14 2v5h5M9 13h6M9 17h6"/></svg></div><div class="lbl">document</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h14l-1 11a2 2 0 01-2 2H8a2 2 0 01-2-2L5 8z"/><path d="M9 8V5a3 3 0 016 0v3"/></svg></div><div class="lbl">archive</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div><div class="lbl">clock</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div><div class="lbl">user</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.1-1.2l2-1.5-2-3.5-2.4.9a7 7 0 00-2-1.2L14 3h-4l-.5 2.5a7 7 0 00-2 1.2L5 5.8 3 9.3l2 1.5A7 7 0 005 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.5 2.4-.9a7 7 0 002 1.2L10 21h4l.5-2.5a7 7 0 002-1.2l2.4.9 2-3.5-2-1.5c.1-.4.1-.8.1-1.2z"/></svg></div><div class="lbl">settings</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h12"/></svg></div><div class="lbl">menu</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M3 12h18"/></svg></div><div class="lbl">plus</div></div>
    <div class="icon-tile"><div class="box"><svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00D9A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg></div><div class="lbl">check</div></div>
  </div>
  <div style="font-family:'Inter',sans-serif;font-size:12px;color:#7A7A7A;margin-top:10px">Outline · 1.6–2px stroke · 22px · rounded line caps · stroke inherits color · matches Heroicons family</div>
</div></body></html>
