<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="_base.css">
<style>
  .pill { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; font-family:'Inter',sans-serif; font-weight:600; font-size:12px; }
  .dot { width:6px; height:6px; border-radius:50%; }
</style></head>
<body><div class="card" style="gap:10px">
  <div class="row">
    <span class="pill" style="background:#D1FAE5;color:#047857"><span class="dot" style="background:#00D9A3"></span>Released</span>
    <span class="pill" style="background:#EEF2FF;color:#2C36A2"><span class="dot" style="background:#4A5CF5"></span>In escrow</span>
    <span class="pill" style="background:#FEF3C7;color:#92400E"><span class="dot" style="background:#F59E0B"></span>Awaiting OTP</span>
    <span class="pill" style="background:#FEE2E2;color:#991B1B"><span class="dot" style="background:#EF4444"></span>Disputed</span>
    <span class="pill" style="background:#F6F7FB;color:#374151"><span class="dot" style="background:#9CA3AF"></span>Draft</span>
  </div>
  <div class="row">
    <span class="pill" style="background:#1A1F3F;color:white;padding:6px 10px">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00D9A3" stroke-width="2"><path d="M12 2L4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5l-8-3z"/></svg>
      Secured
    </span>
    <span class="pill" style="background:linear-gradient(135deg,#4A5CF5 0%,#2C36A2 100%);color:white">TrustScore™ 92</span>
    <span class="pill" style="background:white;border:1px solid #E5E7EB;color:#1E1E1E">KYC tier 2</span>
  </div>
</div></body></html>
