<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_base.css">
<style>
  .b { font-family:'Inter',sans-serif; font-weight:600; font-size:14px; border:none; cursor:pointer; padding:12px 24px; border-radius:10px; }
  .b-primary { background:linear-gradient(135deg,#4A5CF5 0%,#2C36A2 100%); color:white; box-shadow:0 8px 22px rgba(74,92,245,0.28); }
  .b-mint { background:#00D9A3; color:white; }
  .b-ghost { background:transparent; color:#4A5CF5; border:1.5px solid #E5E7EB; }
  .b-dark { background:#1A1F3F; color:white; }
  .b-danger { background:transparent; color:#EF4444; border:1px solid #FCA5A5; }
  .b-sm { padding:8px 16px; font-size:13px; border-radius:8px; }
</style></head>
<body><div class="card" style="gap:12px">
  <div class="row">
    <button class="b b-primary">Create transaction →</button>
    <button class="b b-mint">Release funds</button>
    <button class="b b-dark">Get Started</button>
    <button class="b b-ghost">Learn more</button>
    <button class="b b-danger">Raise dispute</button>
  </div>
  <div class="row">
    <button class="b b-primary b-sm">Verify</button>
    <button class="b b-mint b-sm">Confirm</button>
    <button class="b b-ghost b-sm">Cancel</button>
    <button class="b b-primary" disabled style="opacity:.6;cursor:not-allowed">Disabled</button>
  </div>
</div></body></html>
