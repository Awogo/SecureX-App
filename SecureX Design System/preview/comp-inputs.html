<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_base.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; flex:1; min-width:200px; }
  label { font-family:'Inter',sans-serif; font-weight:600; font-size:13px; color:#1E1E1E; }
  .input { position:relative; display:flex; align-items:center; }
  .input svg { position:absolute; left:14px; pointer-events:none; }
  .input input {
    width:100%; padding:13px 14px 13px 42px;
    border:1.5px solid #E5E7EB; border-radius:10px;
    font-size:14px; color:#1E1E1E; background:#FAFBFC;
    font-family:'Inter',sans-serif; outline:none;
  }
  .input.focused input { border-color:#4A5CF5; background:#FFFFFF; box-shadow:0 0 0 3px rgba(74,92,245,0.18); }
</style></head>
<body><div class="card" style="gap:14px">
  <div class="row">
    <div class="field">
      <label>Email</label>
      <div class="input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        <input value="aisha@securex.com" readonly>
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input focused">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4A5CF5" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
        <input type="password" value="••••••••" readonly>
      </div>
    </div>
  </div>
</div></body></html>
