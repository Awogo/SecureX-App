<!doctype html>
<html><head><meta charset="utf-8"><title>Stat cards</title>
<link rel="stylesheet" href="_base.css"></head>
<body style="background:#F6F7FB"><div class="card" style="background:#F6F7FB;padding:20px;gap:14px">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:660px">
    <div style="background:white;border:1px solid #E5E7EB;border-radius:14px;padding:16px">
      <div style="font-family:'Inter',sans-serif;font-size:12px;color:#7A7A7A;margin-bottom:6px">Today's sale</div>
      <div style="font-family:'Sora','Inter',sans-serif;font-size:26px;font-weight:800;color:#1E1E1E;letter-spacing:-0.01em">₦185,400</div>
      <span style="display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;color:#00D9A3;margin-top:6px">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 10V2M3 5l3-3 3 3"/></svg>+12.4%
      </span>
    </div>
    <div style="background:white;border:1px solid #E5E7EB;border-radius:14px;padding:16px">
      <div style="font-family:'Inter',sans-serif;font-size:12px;color:#7A7A7A;margin-bottom:6px">Escrow held</div>
      <div style="font-family:'Sora','Inter',sans-serif;font-size:26px;font-weight:800;color:#1E1E1E;letter-spacing:-0.01em">₦2.4M</div>
      <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#D1FAE5;border-radius:999px;font-size:11px;font-weight:600;color:#047857;margin-top:6px">Secured</span>
    </div>
    <div style="background:white;border:1px solid #E5E7EB;border-radius:14px;padding:16px">
      <div style="font-family:'Inter',sans-serif;font-size:12px;color:#7A7A7A;margin-bottom:6px">This week</div>
      <div style="font-family:'Sora','Inter',sans-serif;font-size:26px;font-weight:800;color:#1E1E1E;letter-spacing:-0.01em">₦962K</div>
      <span style="display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;color:#00D9A3;margin-top:6px">+8.2%</span>
    </div>
  </div>
</div></body></html>
