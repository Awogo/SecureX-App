<!doctype html>
<html><head><meta charset="utf-8"><title>Trust score card</title>
<link rel="stylesheet" href="_base.css"></head>
<body style="background:#F6F7FB"><div class="card" style="background:#F6F7FB;padding:24px">
  <div style="background:linear-gradient(135deg,#4A5CF5 0%,#2C36A2 100%);border-radius:20px;padding:24px 28px;display:flex;justify-content:space-between;align-items:center;color:white;max-width:620px;box-shadow:0 12px 32px rgba(44,54,162,0.25)">
    <div>
      <div style="font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;opacity:0.7;margin-bottom:6px">TrustScore™</div>
      <div style="font-family:'Sora','Inter',sans-serif;font-size:24px;font-weight:700;margin-bottom:8px">Your Trust Score</div>
      <span style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,0.18);border-radius:999px;font-size:12px;font-weight:600;margin-bottom:6px">
        <span style="width:6px;height:6px;background:#00D9A3;border-radius:50%"></span>Excellent
      </span>
      <div style="font-size:13px;opacity:0.85;margin-top:8px">Top 15% of sellers</div>
    </div>
    <div style="position:relative;width:120px;height:120px">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="10"/>
        <circle cx="60" cy="60" r="52" fill="none" stroke="white" stroke-width="10" stroke-dasharray="327" stroke-dashoffset="33" stroke-linecap="round" transform="rotate(-90 60 60)"/>
      </svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Sora',sans-serif;font-size:38px;font-weight:800;color:white">90</div>
    </div>
  </div>
</div></body></html>
