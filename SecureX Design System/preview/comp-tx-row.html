<!doctype html>
<html><head><meta charset="utf-8"><title>Transaction row</title>
<link rel="stylesheet" href="_base.css"></head>
<body style="background:#F6F7FB"><div class="card" style="background:#F6F7FB;padding:18px">
  <div style="background:white;border:1px solid #E5E7EB;border-radius:14px;overflow:hidden">
    <div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 0.8fr;padding:12px 18px;border-bottom:1px solid #EEF0F4;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#7A7A7A">
      <span>Counterparty</span><span>Amount</span><span>Status</span><span>Date</span>
    </div>
    <div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 0.8fr;padding:14px 18px;align-items:center;font-family:'Inter',sans-serif;font-size:14px;color:#1E1E1E">
      <div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:#EEF2FF;color:#2C36A2;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px">CO</div><div><div style="font-weight:600">Chinedu Okeke</div><div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#7A7A7A">TXN-0x7f3a</div></div></div>
      <div style="font-family:'Sora','Inter',sans-serif;font-weight:700">₦185,000</div>
      <div><span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:#D1FAE5;color:#047857;font-size:12px;font-weight:600"><span style="width:5px;height:5px;background:#00D9A3;border-radius:50%"></span>Released</span></div>
      <div style="color:#7A7A7A;font-size:13px">May 14</div>
    </div>
    <div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 0.8fr;padding:14px 18px;align-items:center;font-family:'Inter',sans-serif;font-size:14px;color:#1E1E1E;border-top:1px solid #EEF0F4">
      <div style="display:flex;align-items:center;gap:10px"><div style="width:32px;height:32px;border-radius:50%;background:#FEF3C7;color:#92400E;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px">AB</div><div><div style="font-weight:600">Aisha Bello</div><div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#7A7A7A">TXN-0x7f3b</div></div></div>
      <div style="font-family:'Sora','Inter',sans-serif;font-weight:700">₦42,500</div>
      <div><span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:#EEF2FF;color:#2C36A2;font-size:12px;font-weight:600"><span style="width:5px;height:5px;background:#4A5CF5;border-radius:50%"></span>In escrow</span></div>
      <div style="color:#7A7A7A;font-size:13px">May 14</div>
    </div>
  </div>
</div></body></html>
